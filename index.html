<!DOCTYPE html>
<html>
<head>
<title>AI Quiz Buzzer</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}

#buzz{
width:280px;
height:280px;
background:red;
border-radius:50%;
font-size:45px;
color:white;
border:none;
display:none;
box-shadow:0 0 30px red;
}

#buzz:active{
transform:scale(0.9);
}

#teamBox{
margin-top:100px;
}

</style>

</head>

<body>

<h1>AI Agents Quiz</h1>

<div id="teamBox">

<input id="team" placeholder="Enter Team Name" style="font-size:20px">

<br><br>

<button onclick="register()">Join</button>

</div>

<div id="buzzer" style="display:none">

<h2 id="teamname"></h2>

<button id="buzz" onclick="buzz()">BUZZ</button>

<p id="status"></p>

</div>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="firebase.js"></script>

<script>

let team="";

function register(){

team=document.getElementById("team").value;

if(team==""){
alert("Enter team name");
return;
}

document.getElementById("teamBox").style.display="none";
document.getElementById("buzzer").style.display="block";

document.getElementById("teamname").innerText="Team: "+team;

document.getElementById("buzz").style.display="inline";

}

function buzz(){

document.getElementById("sound").play();

db.once("value",function(snapshot){

let data=snapshot.val();

if(data.locked){
document.getElementById("status").innerText="⛔ Buzzer Locked";
return;
}

if(!data.winner){

db.update({winner:team});

document.getElementById("status").innerText="Buzz Sent!";

}

});

}

</script>

</body>
</html>
